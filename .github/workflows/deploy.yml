# =============================================================
# Savage 2 Launcher — Deploy to NA2 Fileserver
# =============================================================
# Runs after a successful Release workflow on a version tag.
# Uploads signed Tauri bundles to the NA2 fileserver via
# Tailscale so they can be served from masterserver1.
#
# File placement mirrors the public URL structure:
#   https://masterserver1.talesofnewerth.com/launcher/{platform}/latest/{file}
#   → /uploads/launcher/{platform}/latest/{file}  on NA2
#
# Required GitHub Secrets:
#   TAILSCALE_OAUTH_CLIENT_ID     - Tailscale OAuth client ID
#   TAILSCALE_OAUTH_CLIENT_SECRET - Tailscale OAuth client secret
# =============================================================

name: Deploy

on:
  # Trigger after Release workflow completes on a version tag
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches:
      - master

  # Manual trigger
  workflow_dispatch:
    inputs:
      release_run_id:
        description: 'Release workflow run ID (leave empty for latest)'
        required: false
        type: string

concurrency:
  group: deploy-na2
  cancel-in-progress: false   # Never cancel in-progress deploys

env:
  TAILSCALE_TAILNET: "tailf1bc2a.ts.net"
  NA2_HOST: "100.96.144.82"
  NA2_USER: "deployer"
  # Absolute paths on the NA2 server per OS family
  NA2_WIN_ROOT:    "/appdata/patches/wb6/launcher"
  NA2_LINUX_ROOT:  "/appdata/patches/lr1/launcher"
  NA2_DARWIN_ROOT: "/appdata/patches/mr1/launcher"

jobs:
  # ===========================================================
  # Gate: only proceed if the triggering build succeeded
  # ===========================================================
  check-release:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      run_id: ${{ steps.meta.outputs.run_id }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_ID="${{ github.event.inputs.release_run_id }}"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi

          # If no run ID was provided, find the latest successful Release run
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/release.yml/runs?status=success&per_page=1" \
              --jq '.workflow_runs[0].id')
          fi

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::Could not determine Release workflow run ID"
            exit 1
          fi

          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "Using Release workflow run: ${RUN_ID}"
        env:
          GH_TOKEN: ${{ github.token }}

  # ===========================================================
  # Deploy launcher artifacts to NA2 fileserver via Tailscale
  # ===========================================================
  deploy-na2:
    needs: check-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ needs.check-release.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "::group::All downloaded artifacts"
          find artifacts/ -type f | sort
          echo "::endgroup::"

      - name: Connect to Tailscale
        shell: bash
        run: |
          # --- Install dependencies ---
          sudo apt-get update -y && sudo apt-get install -y rsync openssh-client curl jq
          curl -fsSL https://tailscale.com/install.sh | sudo sh

          # --- Start tailscaled in userspace ---
          sudo tailscaled --state="mem:" > /dev/null 2>&1 &
          sleep 2

          # --- Retrieve OAuth access token ---
          echo "Retrieving OAuth access token..."
          OAUTH_RESPONSE=$(curl --silent --show-error -X POST \
            "https://api.tailscale.com/api/v2/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}")

          ACCESS_TOKEN=$(echo "${OAUTH_RESPONSE}" | jq -r .access_token)
          if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
            echo "::error::Failed to retrieve OAuth access token"
            echo "Response: ${OAUTH_RESPONSE}"
            exit 1
          fi

          # --- Create ephemeral auth key ---
          JSON_PAYLOAD=$(printf '{
            "capabilities": {
              "devices": {
                "create": {
                  "reusable": false,
                  "ephemeral": true,
                  "preauthorized": true,
                  "tags": ["tag:deployer"]
                }
              }
            },
            "expirySeconds": 600,
            "description": "Ephemeral key for launcher NA2 deploy %s"
          }' "${{ github.run_id }}")

          API_RESPONSE=$(curl --silent --show-error -X POST \
            "https://api.tailscale.com/api/v2/tailnet/${{ env.TAILSCALE_TAILNET }}/keys" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${JSON_PAYLOAD}" \
            -w "\n%{http_code}")

          HTTP_BODY=$(echo "${API_RESPONSE}" | sed '$ d')
          HTTP_CODE=$(echo "${API_RESPONSE}" | tail -n 1)

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Tailscale API returned status ${HTTP_CODE}"
            echo "Body: ${HTTP_BODY}"
            exit 1
          fi

          EPHEMERAL_AUTHKEY=$(echo "${HTTP_BODY}" | jq -r .key)
          if [ -z "${EPHEMERAL_AUTHKEY}" ] || [ "${EPHEMERAL_AUTHKEY}" = "null" ]; then
            echo "::error::Failed to retrieve ephemeral auth key"
            exit 1
          fi

          # --- Connect ---
          sudo tailscale up \
            --authkey="${EPHEMERAL_AUTHKEY}" \
            --hostname="github-ci-launcher-na2-${{ github.run_id }}" \
            --accept-routes
          sleep 5
          echo "Connected to Tailscale"

      - name: Deploy artifacts to NA2
        shell: bash
        run: |
          # Map each platform_key to its server root
          declare -A PLATFORM_ROOT
          PLATFORM_ROOT["windows-x86_64"]="${{ env.NA2_WIN_ROOT }}"
          PLATFORM_ROOT["linux-x86_64"]="${{ env.NA2_LINUX_ROOT }}"
          PLATFORM_ROOT["darwin-x86_64"]="${{ env.NA2_DARWIN_ROOT }}"
          PLATFORM_ROOT["darwin-aarch64"]="${{ env.NA2_DARWIN_ROOT }}"

          PLATFORMS=("windows-x86_64" "linux-x86_64" "darwin-x86_64" "darwin-aarch64")
          FAILED=0

          for PLATFORM in "${PLATFORMS[@]}"; do
            SRC="artifacts/${PLATFORM}"
            ROOT="${PLATFORM_ROOT[$PLATFORM]}"
            ARCHIVE_DEST="${ROOT}/${PLATFORM}"
            LATEST_DEST="${ROOT}/${PLATFORM}/latest"

            if [ ! -d "$SRC" ]; then
              echo "⏭  Skipping ${PLATFORM} (no artifacts found)"
              continue
            fi

            echo "Deploying ${PLATFORM}..."

            # Ensure remote directories exist
            tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
              "mkdir -p '${ARCHIVE_DEST}' '${LATEST_DEST}'"

            # 1) Archive: upload original files (with version in filename)
            rsync -avz \
              -e "tailscale ssh ${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
              "${SRC}/" \
              ":${ARCHIVE_DEST}/"

            if [ $? -ne 0 ]; then
              echo "::error::Failed to deploy ${PLATFORM} archive files"
              FAILED=1
              continue
            fi
            echo "  ✔  Archived originals to ${ARCHIVE_DEST}"

            # 2) Latest: copy renamed files (strip version number) for stable URLs
            #    Version pattern: _X.Y.Z (e.g. _1.0.4)
            mkdir -p "latest-staging/${PLATFORM}"
            for FILE in "${SRC}"/*; do
              [ -f "$FILE" ] || continue
              BASENAME=$(basename "$FILE")
              # Strip _X.Y.Z from the filename (e.g. "Savage 2 Launcher_1.0.4_x64_en-US.msi"
              #   → "Savage 2 Launcher_x64_en-US.msi")
              RENAMED=$(echo "$BASENAME" | sed 's/_[0-9]\+\.[0-9]\+\.[0-9]\+//')
              cp "$FILE" "latest-staging/${PLATFORM}/${RENAMED}"
            done

            rsync -avz --delete \
              -e "tailscale ssh ${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
              "latest-staging/${PLATFORM}/" \
              ":${LATEST_DEST}/"

            if [ $? -eq 0 ]; then
              echo "  ✔  Latest (renamed) deployed to ${LATEST_DEST}"
            else
              echo "::error::Failed to deploy ${PLATFORM} latest files"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

          echo ""
          echo "✅ All artifacts deployed to NA2"

      - name: Verify deployment
        shell: bash
        run: |
          echo "::group::Remote file listing"
          tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
            "find ${{ env.NA2_WIN_ROOT }} ${{ env.NA2_LINUX_ROOT }} ${{ env.NA2_DARWIN_ROOT }} -type f 2>/dev/null | sort"
          echo "::endgroup::"
