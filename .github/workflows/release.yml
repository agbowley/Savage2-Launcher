# ============================================================
#  Savage 2 Launcher – Release Build
#
#  Triggered by pushing a version tag (e.g. v1.0.3).
#  Builds signed Tauri bundles for every platform and uploads
#  them to a GitHub Release.
#
#  To publish the update to the savage2.net launcher API,
#  run the separate "Publish" workflow after this completes.
#
#  Required secrets:
#    TAURI_PRIVATE_KEY  – minisign private key
#    TAURI_KEY_PASSWORD – password for the private key
# ============================================================
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

jobs:
  # -----------------------------------------------------------
  #  Build matrix – one job per platform / architecture
  # -----------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_key: windows-x86_64
            rust_targets: ''
            tauri_args: ''

          - os: ubuntu-22.04
            platform_key: linux-x86_64
            rust_targets: ''
            tauri_args: ''

          # macOS builds – ready for when macOS support is added.
          # Produces unsigned bundles; proper distribution requires
          # Apple Developer certs (APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD).
          - os: macos-latest
            platform_key: darwin-x86_64
            rust_targets: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

          - os: macos-latest
            platform_key: darwin-aarch64
            rust_targets: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.os }}
    environment: tauri

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform_key }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.tauri_args }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          case "${{ matrix.platform_key }}" in
            windows-x86_64)
              cp src-tauri/target/release/bundle/msi/*.msi         artifacts/ 2>/dev/null || true
              cp src-tauri/target/release/bundle/msi/*.msi.zip     artifacts/
              cp src-tauri/target/release/bundle/msi/*.msi.zip.sig artifacts/
              ;;
            linux-x86_64)
              cp src-tauri/target/release/bundle/appimage/*.AppImage            artifacts/ 2>/dev/null || true
              cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz     artifacts/
              cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig artifacts/
              ;;
            darwin-x86_64)
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz \
                 "artifacts/Savage 2 Launcher_x86_64.app.tar.gz"
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
                 "artifacts/Savage 2 Launcher_x86_64.app.tar.gz.sig"
              ;;
            darwin-aarch64)
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz \
                 "artifacts/Savage 2 Launcher_aarch64.app.tar.gz"
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
                 "artifacts/Savage 2 Launcher_aarch64.app.tar.gz.sig"
              ;;
          esac

          echo "::group::Collected artifacts"
          ls -lah artifacts/
          echo "::endgroup::"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_key }}
          path: artifacts/
          retention-days: 5

  # -----------------------------------------------------------
  #  Create GitHub Release with all platform artifacts
  # -----------------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts into release directory
        run: |
          mkdir -p release
          find all-artifacts -type f -exec cp {} release/ \;
          echo "::group::Release files"
          ls -lah release/
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Savage 2 Launcher v${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: release/*
