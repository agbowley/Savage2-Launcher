# ============================================================
#  Savage 2 Launcher — CI / Release / Deploy
#
#  Single workflow that handles:
#    1. Lint (every push & PR)
#    2. Build signed Tauri bundles (every push & tag)
#    3. Create GitHub Release (v* tags only)
#    4. Deploy to NA2 fileserver via Tailscale (v* tags only)
#
#  Required secrets:
#    TAURI_PRIVATE_KEY             – minisign private key
#    TAURI_KEY_PASSWORD            – password for the private key
#    TAILSCALE_OAUTH_CLIENT_ID     – Tailscale OAuth client ID
#    TAILSCALE_OAUTH_CLIENT_SECRET – Tailscale OAuth client secret
# ============================================================
name: Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

env:
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

jobs:
  # -----------------------------------------------------------
  #  Lint
  # -----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:nofix

  # -----------------------------------------------------------
  #  Build matrix – one job per platform / architecture
  # -----------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_key: windows-x86_64
            rust_targets: ''
            tauri_args: ''

          - os: ubuntu-22.04
            platform_key: linux-x86_64
            rust_targets: ''
            tauri_args: ''

          # macOS builds – ready for when macOS support is added.
          # Produces unsigned bundles; proper distribution requires
          # Apple Developer certs (APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD).
          - os: macos-latest
            platform_key: darwin-x86_64
            rust_targets: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'

          - os: macos-latest
            platform_key: darwin-aarch64
            rust_targets: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform_key }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: npx tauri build ${{ matrix.tauri_args }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          VERSION=$(node -p "require('./package.json').version")

          case "${{ matrix.platform_key }}" in
            windows-x86_64)
              cp src-tauri/target/release/bundle/msi/*.msi         artifacts/ 2>/dev/null || true
              cp src-tauri/target/release/bundle/msi/*.msi.zip     artifacts/
              cp src-tauri/target/release/bundle/msi/*.msi.zip.sig artifacts/
              ;;
            linux-x86_64)
              cp src-tauri/target/release/bundle/appimage/*.AppImage            artifacts/ 2>/dev/null || true
              cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz     artifacts/
              cp src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig artifacts/
              ;;
            darwin-x86_64)
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz \
                 "artifacts/Savage 2 Launcher_${VERSION}_x86_64.app.tar.gz"
              cp src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
                 "artifacts/Savage 2 Launcher_${VERSION}_x86_64.app.tar.gz.sig"
              ;;
            darwin-aarch64)
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz \
                 "artifacts/Savage 2 Launcher_${VERSION}_aarch64.app.tar.gz"
              cp src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
                 "artifacts/Savage 2 Launcher_${VERSION}_aarch64.app.tar.gz.sig"
              ;;
          esac

          echo "::group::Collected artifacts"
          ls -lah artifacts/
          echo "::endgroup::"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform_key }}
          path: artifacts/
          retention-days: 5

  # -----------------------------------------------------------
  #  Create GitHub Release with all platform artifacts
  # -----------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts into release directory
        run: |
          mkdir -p release
          find all-artifacts -type f -exec cp {} release/ \;
          echo "::group::Release files"
          ls -lah release/
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Savage 2 Launcher v${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: release/*

  # -----------------------------------------------------------
  #  Deploy to NA2 fileserver via Tailscale (v* tags only)
  # -----------------------------------------------------------
  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    env:
      TAILSCALE_TAILNET: "tailf1bc2a.ts.net"
      NA2_HOST: "100.96.144.82"
      NA2_USER: "deployer"
      NA2_WIN_ROOT:    "/appdata/patches/wb6/launcher"
      NA2_LINUX_ROOT:  "/appdata/patches/lr1/launcher"
      NA2_DARWIN_ROOT: "/appdata/patches/mr1/launcher"

    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "::group::All downloaded artifacts"
          find artifacts/ -type f | sort
          echo "::endgroup::"

      - name: Connect to Tailscale
        shell: bash
        run: |
          sudo apt-get update -y && sudo apt-get install -y curl jq
          curl -fsSL https://tailscale.com/install.sh | sudo sh

          sudo tailscaled --state="mem:" > /dev/null 2>&1 &
          sleep 2

          echo "Retrieving OAuth access token..."
          OAUTH_RESPONSE=$(curl --silent --show-error -X POST \
            "https://api.tailscale.com/api/v2/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}")

          ACCESS_TOKEN=$(echo "${OAUTH_RESPONSE}" | jq -r .access_token)
          if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
            echo "::error::Failed to retrieve OAuth access token"
            echo "Response: ${OAUTH_RESPONSE}"
            exit 1
          fi

          JSON_PAYLOAD=$(printf '{
            "capabilities": {
              "devices": {
                "create": {
                  "reusable": false,
                  "ephemeral": true,
                  "preauthorized": true,
                  "tags": ["tag:deployer"]
                }
              }
            },
            "expirySeconds": 600,
            "description": "Ephemeral key for launcher NA2 deploy %s"
          }' "${{ github.run_id }}")

          API_RESPONSE=$(curl --silent --show-error -X POST \
            "https://api.tailscale.com/api/v2/tailnet/${{ env.TAILSCALE_TAILNET }}/keys" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${JSON_PAYLOAD}" \
            -w "\n%{http_code}")

          HTTP_BODY=$(echo "${API_RESPONSE}" | sed '$ d')
          HTTP_CODE=$(echo "${API_RESPONSE}" | tail -n 1)

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Tailscale API returned status ${HTTP_CODE}"
            echo "Body: ${HTTP_BODY}"
            exit 1
          fi

          EPHEMERAL_AUTHKEY=$(echo "${HTTP_BODY}" | jq -r .key)
          if [ -z "${EPHEMERAL_AUTHKEY}" ] || [ "${EPHEMERAL_AUTHKEY}" = "null" ]; then
            echo "::error::Failed to retrieve ephemeral auth key"
            exit 1
          fi

          sudo tailscale up \
            --authkey="${EPHEMERAL_AUTHKEY}" \
            --hostname="github-ci-launcher-na2-${{ github.run_id }}" \
            --accept-routes
          sleep 5
          echo "Connected to Tailscale"

      - name: Deploy artifacts to NA2
        shell: bash
        run: |
          # Map each platform_key to its server root
          declare -A PLATFORM_ROOT
          PLATFORM_ROOT["windows-x86_64"]="${{ env.NA2_WIN_ROOT }}"
          PLATFORM_ROOT["linux-x86_64"]="${{ env.NA2_LINUX_ROOT }}"
          PLATFORM_ROOT["darwin-x86_64"]="${{ env.NA2_DARWIN_ROOT }}"
          PLATFORM_ROOT["darwin-aarch64"]="${{ env.NA2_DARWIN_ROOT }}"

          PLATFORMS=("windows-x86_64" "linux-x86_64" "darwin-x86_64" "darwin-aarch64")
          FAILED=0

          for PLATFORM in "${PLATFORMS[@]}"; do
            SRC="artifacts/${PLATFORM}"
            ROOT="${PLATFORM_ROOT[$PLATFORM]}"
            ARCHIVE_DEST="${ROOT}/${PLATFORM}"
            LATEST_DEST="${ROOT}/${PLATFORM}/latest"

            if [ ! -d "$SRC" ]; then
              echo "⏭  Skipping ${PLATFORM} (no artifacts found)"
              continue
            fi

            echo "Deploying ${PLATFORM}..."

            # Ensure remote directories exist
            tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
              "mkdir -p '${ARCHIVE_DEST}' '${LATEST_DEST}'"

            # 1) Archive: upload original files (with version in filename)
            #    Uses tar piping over tailscale ssh to avoid rsync permission issues
            tar cf - -C "${SRC}" . | \
              tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
                "tar xf - -C '${ARCHIVE_DEST}'"

            if [ $? -ne 0 ]; then
              echo "::error::Failed to deploy ${PLATFORM} archive files"
              FAILED=1
              continue
            fi
            echo "  ✔  Archived originals to ${ARCHIVE_DEST}"

            # 2) Latest: upload renamed files (version stripped) for stable URLs
            #    Version pattern: _X.Y.Z (e.g. _1.0.5)
            mkdir -p "latest-staging/${PLATFORM}"
            for FILE in "${SRC}"/*; do
              [ -f "$FILE" ] || continue
              BASENAME=$(basename "$FILE")
              RENAMED=$(echo "$BASENAME" | sed 's/_[0-9]\+\.[0-9]\+\.[0-9]\+//')
              cp "$FILE" "latest-staging/${PLATFORM}/${RENAMED}"
            done

            # Clean old files in latest/ then extract new ones
            tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
              "rm -f '${LATEST_DEST}'/*"

            tar cf - -C "latest-staging/${PLATFORM}" . | \
              tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
                "tar xf - -C '${LATEST_DEST}'"

            if [ $? -eq 0 ]; then
              echo "  ✔  Latest (renamed) deployed to ${LATEST_DEST}"
            else
              echo "::error::Failed to deploy ${PLATFORM} latest files"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

          echo ""
          echo "✅ All artifacts deployed to NA2"

      - name: Verify deployment
        shell: bash
        run: |
          echo "::group::Remote file listing"
          tailscale ssh "${{ env.NA2_USER }}@${{ env.NA2_HOST }}" \
            "find ${{ env.NA2_WIN_ROOT }} ${{ env.NA2_LINUX_ROOT }} ${{ env.NA2_DARWIN_ROOT }} -type f 2>/dev/null | sort"
          echo "::endgroup::"
